<!DOCTYPE html>
<html>
  <head>
    <title>Watercolour Named</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400..900;1,400..900&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Lexend:wght@100..900&family=Noticia+Text:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <script src="../js/p5.min.js"></script>
    <script src="../js/spectral.min.js"></script>
    <script src="../js/p5.brush.min.js"></script>
    <style>
      html {
        overflow: hidden;
      }
      body {
        margin: 0;
        background: #ffffff;
        font-family: "EB Garamond", "Alegreya", serif;
      }
      #labels {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
      }
      #labels .label {
        position: absolute;
        transform: translate(-50%, -50%) rotate(var(--r, 0deg));
        white-space: nowrap;
        color: #15151a;
        mix-blend-mode: multiply;
        opacity: 0;
        will-change: opacity;
      }
    </style>
  </head>
  <body>
    <div id="labels"></div>
    <script src="./sketch.js"></script>
  </body>
</html>
