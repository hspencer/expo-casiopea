<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Actualidad de la Escuela - embed wiki</title>
    <style>
      body {
        margin: 0;
        background: #04050a;
      }
      /* El contenedor manda el ancho; el sketch calcula el alto como su mitad. */
      #p5 {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
      }
      #p5 canvas {
        display: block;
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <!-- Para incrustar en la wiki Casiopea basta con este contenedor mas la
         carga de p5 y del sketch (por ejemplo en una pagina con el extension
         de scripts, o en un Widget). El sketch NO usa p5.brush. -->
    <div id="p5"></div>

    <script src="../js/p5.min.js"></script>
    <script src="./sketch.js"></script>
  </body>
</html>
