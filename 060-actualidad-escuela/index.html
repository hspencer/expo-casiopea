<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Actualidad Escuela — Piedras que no calzan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- p5.js + matter.js locales (mismo patrón que el resto de la expo) -->
    <script src="../js/p5.min.js"></script>
    <script src="../js/matter.js"></script>
    <style>
      html {
        overflow: hidden;
      }
      /* Tema claro · fondo transparente del canvas (lo aporta el body) */
      body {
        margin: 0;
        background: #f4f2ec;
        font-family: "IBM Plex Sans", sans-serif;
        cursor: default;
        color: #15151a;
      }
      canvas {
        display: block;
        background: transparent;
      }
      /* Ficha de la piedra seleccionada: fija arriba a la izquierda,
         como si fuese el título del sketch */
      #cartela {
        position: fixed;
        top: 24px;
        left: 28px;
        max-width: 380px;
        color: #15151a;
        pointer-events: none;
        opacity: 0;
        transition: opacity 140ms ease;
        z-index: 10;
      }
      #cartela.on {
        opacity: 1;
      }
      /* nombre del curso: IBM Plex Sans, ancho normal, peso fuerte */
      #cartela .titulo {
        font-family: "IBM Plex Sans", sans-serif;
        font-size: 24px;
        line-height: 1.12;
        margin: 0 0 12px;
        font-weight: 600;
        max-width: 9em;
      }
      /* meta: rejilla key/value */
      #cartela .meta {
        display: grid;
        grid-template-columns: auto 1fr;
        column-gap: 10px;
        row-gap: 3px;
        font-size: 12.5px;
        line-height: 1.4;
        margin: 0;
      }
      /* keys: IBM Plex Sans CONDENSED (ancho estrecho), peso medio, versalitas */
      #cartela .k {
        font-family: "IBM Plex Sans Condensed", "IBM Plex Sans", sans-serif;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-size: 11px;
        color: #8a8378;
        align-self: baseline;
        padding-top: 1px;
      }
      /* values: IBM Plex Sans (ancho normal), peso ligero */
      #cartela .v {
        font-family: "IBM Plex Sans", sans-serif;
        font-weight: 400;
        color: #15151a;
      }
      #cartela .swatch {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 2px;
        margin-right: 6px;
        vertical-align: baseline;
        outline: 1px solid rgba(20, 20, 25, 0.12);
      }
    </style>
  </head>
  <body>
    <div id="cartela">
      <p class="titulo"></p>
      <div class="meta"></div>
    </div>
    <script src="./sketch.js"></script>
  </body>
</html>
